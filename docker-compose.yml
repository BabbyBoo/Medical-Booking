services:
  postgres:
    image: postgres:15-alpine
    container_name: medical_booking_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: meduser
      POSTGRES_PASSWORD: medpass123
      POSTGRES_DB: medical_booking
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U meduser -d medical_booking" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
